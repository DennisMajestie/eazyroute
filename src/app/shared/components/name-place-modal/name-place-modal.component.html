<div class="modal-backdrop" *ngIf="isOpen" (click)="onBackdropClick($event)">
    <div class="modal-container">
        <div class="modal-header">
            <h3>🏷️ Name This Place</h3>
            <button class="close-btn" (click)="onCancel()" type="button">×</button>
        </div>
        
        <div class="modal-body">
            <p class="description">Help the community by giving this location a recognizable name.</p>
            
            <div class="location-details">
                <span class="label">Current Label:</span>
                <span class="value">{{ currentAddress }}</span>
            </div>
            
            <div class="form-group">
                <label for="placeName">Custom Name</label>
                <input 
                    id="placeName" 
                    type="text" 
                    [(ngModel)]="customName" 
                    placeholder="e.g. Yellow House Junction" 
                    class="form-control"
                    autofocus
                    [disabled]="isSubmitting"
                />
                <small class="hint" [class.error]="customName.length > 0 && customName.length < 3">
                    Minimum 3 characters required
                </small>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn btn-secondary" (click)="onCancel()" [disabled]="isSubmitting">Cancel</button>
            <button 
                class="btn btn-primary" 
                (click)="onSubmit()" 
                [disabled]="isSubmitting || customName.trim().length < 3"
            >
                {{ isSubmitting ? 'Submitting...' : 'Submit Name' }}
            </button>
        </div>
    </div>
</div>
